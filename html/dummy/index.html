<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>spandan.fun/dummy</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: \"Segoe UI\", Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 50%, #1e3c72 100%);
            color: white;
        }
        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 60px 80px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }
        .name {
            font-size: 1.8rem;
            margin: 15px 0;
            color: #ffd700;
        }
        .subtitle {
            font-size: 1.2rem;
            opacity: 0.9;
            margin-top: 20px;
        }
        .divider {
            width: 80px;
            height: 4px;
            background: #ffd700;
            margin: 20px auto;
            border-radius: 2px;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>✨ spandan.fun ✨</h1>
        <div class="divider"></div>
        <p class="name">By Rohit Sharma</p>
        <p class="name">Built by Spandan_Astra ⭐</p>
        <div class="divider"></div>
        <p class="subtitle">/dummy — It works! ✅</p>
    </div>
</body>
</html>
