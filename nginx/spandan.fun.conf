upstream spandan_backend {
    server 127.0.0.1:3001;
    keepalive 128;
}

upstream spandan_proxy {
    server 127.0.0.1:5002;
    keepalive 64;
}

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api:10m rate=500r/s;
limit_req_zone $binary_remote_addr zone=auth:10m rate=30r/s;
limit_conn_zone $binary_remote_addr zone=conn:10m;

# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name spandan.fun www.spandan.fun;
    return 301 https://$host$request_uri;
}

# HTTPS server
server {
    listen 443 ssl http2;
    server_name spandan.fun www.spandan.fun;

    ssl_certificate /etc/letsencrypt/live/spandan.fun/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/spandan.fun/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparam.pem;

    # HSTS
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Connection limits
    limit_conn conn 200;

    # Client body size (for file uploads)
    client_max_body_size 50m;

    # ============ API Proxy (direct to backend) ============
    location /spandan/api/ {
        limit_req zone=api burst=1000 nodelay;

        proxy_pass http://spandan_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # Buffering
        proxy_buffering on;
        proxy_buffer_size 16k;
        proxy_buffers 4 32k;
        proxy_busy_buffers_size 64k;

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # ============ Auth API (stricter rate limit) ============
    location /spandan/api/auth/ {
        limit_req zone=auth burst=100 nodelay;

        proxy_pass http://spandan_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    # ============ WebSocket Proxy (Socket.IO) ============
    location /spandan/socket.io/ {
        proxy_pass http://spandan_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Long timeouts for WebSocket
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;

        # Disable buffering for real-time
        proxy_buffering off;
    }

    # ============ Static Frontend ============
    location /spandan/assets/ {
        alias /var/www/spandan.fun/assets/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location /spandan/ {
        root /var/www/spandan.fun;
        try_files $uri $uri/ /spandan/index.html;

        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }
    }

    # ============ Root redirect ============
    location = / {
        return 301 /spandan/;
    }

    # ============ Health check (for monitoring) ============
    location /health {
        proxy_pass http://spandan_backend/api/health;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        access_log off;
    }
}
