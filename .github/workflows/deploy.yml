name: Deploy to Production

on:
  workflow_dispatch:

env:
  INFISICAL_ENVIRONMENT: prod
  INFISICAL_SECRET_PATH: /

jobs:
  deploy:
    name: SSH Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SPANDAN_DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.SPANDAN_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy
        run: |
          ssh -i ~/.ssh/id_ed25519 spandan-deploy@${{ secrets.SPANDAN_HOST }} bash << 'DEPLOY'
            set -e

            cd /var/samagama/spandan-workspace/spandan

            echo "==> Pulling latest code..."
            git pull origin main

            echo "==> Authenticating with Infisical..."

            export INFISICAL_TOKEN=$(npx @infisical/cli@0.43.40 login \
              --method=universal-auth \
              --client-id="${{ secrets.INFISICAL_CLIENT_ID }}" \
              --client-secret="${{ secrets.INFISICAL_CLIENT_SECRET }}" \
              --silent \
              --plain)

            if [ -z "$INFISICAL_TOKEN" ]; then
              echo "Infisical authentication failed"
              exit 1
            fi

            echo "==> Writing frontend .env from Infisical..."

            npx @infisical/cli@0.43.40 export \
              --token="$INFISICAL_TOKEN" \
              --projectId="${{ secrets.INFISICAL_PROJECT_ID }}" \
              --env="${{ env.INFISICAL_ENVIRONMENT }}" \
              --path="${{ env.INFISICAL_SECRET_PATH }}" \
              --format=dotenv \
              | grep "^VITE_" > frontend/.env


            echo "==> Writing backend .env from Infisical..."

            npx @infisical/cli@0.43.40 export \
              --token="$INFISICAL_TOKEN" \
              --projectId="${{ secrets.INFISICAL_PROJECT_ID }}" \
              --env="${{ env.INFISICAL_ENVIRONMENT }}" \
              --path="${{ env.INFISICAL_SECRET_PATH }}" \
              --format=dotenv \
              | grep -v "^VITE_" > backend/.env


            echo "==> Cleaning quotes from env files..."

            sed -i "s/='\(.*\)'/=\1/; s/=\"\(.*\)\"/=\1/" frontend/.env backend/.env


            echo "==> Installing frontend dependencies..."
            cd frontend
            npm ci

            echo "==> Building frontend..."
            npm run build

            cd ..

            echo "==> Installing backend dependencies (workspace)..."
            npm install --workspace=backend

            echo "==> Restarting backend..."
            sudo systemctl restart spandan-backend.service

            echo "==> Restarting transcription service (faster-whisper)..."
            # Guarded so the deploy doesn't fail before the unit is installed on the server.
            # One-time setup: see backend/spandan-transcription.service (install deps + unit).
            sudo systemctl restart spandan-transcription.service || echo "WARN: spandan-transcription.service not installed yet — see backend/spandan-transcription.service"

            echo "==> Restarting question-generation worker (only used when Redis is enabled)..."
            # Guarded — only relevant when async generation (Redis) is set up; see backend/spandan-worker.service.
            sudo systemctl restart spandan-worker.service || echo "WARN: spandan-worker.service not installed (fine unless async generation/Redis is enabled)"

            echo "==> Restarting spandan service..."
            sudo systemctl restart spandan.service

            echo "==> Using PM2 for zero-downtime reload..."

            # Install pm2 globally if not present
            command -v pm2 >/dev/null 2>&1 || npm install -g pm2

            # Start or reload with PM2 (zero-downtime)
            if pm2 describe spandan-backend > /dev/null 2>&1; then
              echo "==> Reloading backend (zero-downtime)..."
              pm2 reload ecosystem.config.js --only spandan-backend
              echo "==> Reloading proxy (zero-downtime)..."
              pm2 reload ecosystem.config.js --only spandan-proxy
            else
              echo "==> Starting services with PM2..."
              pm2 start ecosystem.config.js
              pm2 save
            fi

            echo "==> Reloading nginx..."
            sudo nginx -t && sudo systemctl reload nginx

            echo "==> Waiting for services to be healthy..."
            sleep 5

            # Health check
            if curl -sf http://localhost:3001/api/health > /dev/null 2>&1; then
              echo "==> Backend is healthy"
            else
              echo "==> WARNING: Backend health check failed"
            fi

            echo "==> Deployment complete."
            pm2 status

          DEPLOY
